name: Initialize repository

on:
  push:
    branches: [main]

jobs:
  init:
    # Prevent infinite loop after the init commit
    if: "!contains(github.event.head_commit.message, 'Initialize repository')"
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if initialization is needed
        id: check_init
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          
          # Skip initialization if this is the template repository itself
          if [ "$REPO_NAME" = "Template_Project_RStudio" ]; then
            echo "needs_init=false" >> $GITHUB_OUTPUT
            echo "This is the template repository. Skipping initialization."
            exit 0
          fi
          
          # Check if files with Template_Project_RStudio pattern exist
          shopt -s nullglob
          files=(*Template_Project_RStudio*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "needs_init=false" >> $GITHUB_OUTPUT
            echo "No files with Template_Project_RStudio found. Initialization already done."
          else
            echo "needs_init=true" >> $GITHUB_OUTPUT
            echo "Found ${#files[@]} file(s) with Template_Project_RStudio. Initialization needed."
          fi

      - name: Rename files containing Template_Project_RStudio
        if: steps.check_init.outputs.needs_init == 'true'
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          echo "Initializing repository: $REPO_NAME"

          shopt -s nullglob

          for file in *Template_Project_RStudio*; do
            new_name="${file/Template_Project_RStudio/$REPO_NAME}"
            echo "Renaming: $file -> $new_name"
            mv "$file" "$new_name"
          done

      - name: Commit renamed files and remove workflow
        if: steps.check_init.outputs.needs_init == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if git status --porcelain | grep .; then
            # Remove the init workflow since initialization is complete
            rm .github/workflows/init.yml
            git add .
            git commit -m "Initialize repository"
            git push
          else
            echo "No files renamed"
          fi
